name: mediabiasfactcheckbot

services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: mediabiasfactcheckbot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"

  bot:
    build: .
    image: mediabiasfactcheckbot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB: mongodb://mongodb:27017
      PYTHONUNBUFFERED: "1"
    depends_on:
      - mongodb

  keepalive:
    image: mediabiasfactcheckbot:latest
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB: mongodb://mongodb:27017
    command: ["python", "-c", "from keep_alive import app; app.run(host='0.0.0.0', port=8080)"]
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    profiles: ["keepalive"]

  streamlit:
    image: mediabiasfactcheckbot:latest
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB: mongodb://mongodb:27017
    command:
      - streamlit
      - run
      - streamlit/mongodb_streamlit_submissions.py
      - --server.address=0.0.0.0
      - --server.port=8501
    ports:
      - "8501:8501"
    depends_on:
      - mongodb
    profiles: ["dashboard"]

volumes:
  mongodb-data:
    name: mediabiasfactcheckbot_mongodb-data
